<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Produk Unggulan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#ffffff;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    width:650px;
    background:#f5f2ed;
    border-radius:10px;
    padding:12px;
}

.title{
    font-size:16px;
    font-weight:bold;
    margin-bottom:10px;
}

.products{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.card{
    background:#f5f2ed;
    border:1px solid #d9d9d9;
    border-radius:20px;
    padding:12px;
    transition:0.2s;
}

.card:hover{
    transform:translateY(-2px);
}

.card img{
    width:100%;
    height:170px;
    object-fit:cover;
    border-radius:14px;
}

.product-info{
    text-align:center;
    margin-top:4px;
}

.product-name{
    font-size:14px;
    font-weight:bold;
}

.product-price{
    font-size:14px;
    margin-top:2px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

button{
    border:1px solid #c8c8c8;
    background:#e9e9e9;
    padding:5px 16px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
    transition:0.2s;
}

button:hover{
    background:#dcdcdc;
}

@media(max-width:700px){
    .container{
        width:100%;
    }

    .products{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="title">🛍️ Produk Unggulan</div>

    <div class="products">

        <!-- CARD 1 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop" alt="Laptop Gaming">

            <div class="product-info">
                <div class="product-name">Laptop Gaming</div>
                <div class="product-price">Rp 12.500.000</div>

                <div class="buttons">
                    <button onclick="buyProduct('Laptop Gaming')">Beli</button>
                    <button onclick="wishlistProduct('Laptop Gaming')">Wishlist</button>
                </div>
            </div>
        </div>

        <!-- CARD 2 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=1200&auto=format&fit=crop" alt="Smartphone">

            <div class="product-info">
                <div class="product-name">Smartphone</div>
                <div class="product-price">Rp 3.200.000</div>

                <div class="buttons">
                    <button onclick="buyProduct('Smartphone')">Beli</button>
                    <button onclick="wishlistProduct('Smartphone')">Wishlist</button>
                </div>
            </div>
        </div>

        <!-- CARD 3 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1200&auto=format&fit=crop" alt="Headset">

            <div class="product-info">
                <div class="product-name">Headset</div>
                <div class="product-price">Rp 450.000</div>

                <div class="buttons">
                    <button onclick="buyProduct('Headset')">Beli</button>
                    <button onclick="wishlistProduct('Headset')">Wishlist</button>
                </div>
            </div>
        </div>

    </div>

</div>

<script>
function buyProduct(product){
    alert("Kamu membeli: " + product);
}

function wishlistProduct(product){
    alert(product + " ditambahkan ke wishlist!");
}
</script>

</body>
</html>
